<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pushplay | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #f43f5e;
            --success: #10b981;
            --border: #334155;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease;
        }

        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            text-align: center;
        }

        .login-card h1 {
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        input, select {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.75rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* --- Dashboard Layout --- */
        #dashboard {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* --- Search Section --- */
        .search-container {
            margin-bottom: 3rem;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
        }

        .search-bar {
            display: flex;
            gap: 1rem;
        }

        .search-bar input {
            flex: 1;
            margin-bottom: 0;
        }

        .search-bar select {
            width: 150px;
            margin-bottom: 0;
        }

        .search-bar button {
            width: auto;
            padding: 0 1.5rem;
        }

        /* --- Results Grid --- */
        #search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #000;
        }

        .movie-info {
            padding: 1rem;
        }

        .movie-title {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
        }

        /* --- Modal for Saving --- */
        #save-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1100;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 600px;
            border: 1px solid var(--border);
            display: flex;
            gap: 2rem;
        }

        .modal-left img {
            width: 200px;
            border-radius: 0.5rem;
        }

        .modal-right {
            flex: 1;
        }

        .modal-right h2 {
            margin-bottom: 1rem;
        }

        /* --- Catalog List --- */
        .catalog-section {
            margin-top: 4rem;
        }

        .catalog-section h2 {
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(0,0,0,0.2);
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .btn-delete {
            background: var(--accent);
            padding: 0.5rem;
            width: auto;
            font-size: 0.8rem;
        }

        .btn-delete:hover {
            background: #e11d48;
        }

        .status-msg {
            color: var(--success);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        @media (max-width: 768px) {
            .modal-content {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-card">
            <h1>Pushplay Admin</h1>
            <p style="color: var(--text-dim); margin-bottom: 1.5rem;">Secure Access Required</p>
            <input type="password" id="admin-password" placeholder="Admin Password">
            <button onclick="login()">Enter Dashboard</button>
            <p id="login-error" style="color: var(--accent); font-size: 0.9rem; margin-top: 1rem;"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <header>
            <div class="logo">Pushplay <span style="color: var(--text-dim); font-weight: 300;">Admin</span></div>
            <button style="width: auto; padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--border);" onclick="logout()">Logout</button>
        </header>

        <!-- Search TMDB -->
        <div class="search-container">
            <h2 style="margin-bottom: 1.5rem;">TMDB Content Integration</h2>
            <div class="search-bar">
                <input type="text" id="search-query" placeholder="Type movie or TV show title...">
                <select id="search-type">
                    <option value="movie">Movie</option>
                    <option value="tv">TV Show</option>
                </select>
                <button onclick="searchTMDB()">Search</button>
            </div>
            <div id="search-results">
                <!-- Results populated via JS -->
            </div>
        </div>

        <!-- Catalog List -->
        <div class="catalog-section">
            <h2>Existing Catalog</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Poster</th>
                            <th>Title</th>
                            <th>Year</th>
                            <th>Type</th>
                            <th>Tier</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="catalog-list">
                        <!-- Catalog items populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Save Modal -->
    <div id="save-modal">
        <div class="modal-content">
            <div class="modal-left">
                <img id="preview-poster" src="" alt="Poster">
            </div>
            <div class="modal-right">
                <h2 id="preview-title">Title</h2>
                <p id="preview-meta" style="color: var(--text-dim); margin-bottom: 1rem;"></p>
                
                <label style="font-size: 0.85rem; color: var(--text-dim);">Magnet URL</label>
                <input type="text" id="magnet-url" placeholder="magnet:?xt=urn:btih:...">
                
                <div style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.85rem; color: var(--text-dim);">Required Tier</label>
                        <select id="content-tier">
                            <option value="Free">Free</option>
                            <option value="Basic">Basic</option>
                            <option value="Standard">Standard</option>
                            <option value="Premium">Premium</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button onclick="saveToCatalog()" id="save-btn">Save to Catalog</button>
                    <button onclick="closeModal()" style="background: transparent; border: 1px solid var(--border);">Cancel</button>
                </div>
                <div id="save-status" class="status-msg">Content saved successfully!</div>
            </div>
        </div>
    </div>

    <script>
        let selectedItem = null;

        // Login Logic
        async function login() {
            const password = document.getElementById('admin-password').value;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (res.ok) {
                    sessionStorage.setItem('admin_auth', 'true');
                    showDashboard();
                } else {
                    document.getElementById('login-error').innerText = 'Invalid password';
                }
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_auth');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadCatalog();
            }, 400);
        }

        // Search Logic
        async function searchTMDB() {
            const query = document.getElementById('search-query').value;
            const type = document.getElementById('search-type').value;
            if (!query) return;

            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = '<p>Searching...</p>';

            try {
                const res = await fetch(`/api/admin/tmdb/search?query=${encodeURIComponent(query)}&type=${type}`);
                const data = await res.json();
                
                resultsContainer.innerHTML = '';
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <img src="${item.poster_url || 'https://via.placeholder.com/300x450?text=No+Poster'}" alt="${item.title}">
                        <div class="movie-info">
                            <div class="movie-title">${item.title}</div>
                            <div class="movie-meta">${item.year} • ${item.type}</div>
                        </div>
                    `;
                    card.onclick = () => openModal(item);
                    resultsContainer.appendChild(card);
                });
            } catch (err) {
                resultsContainer.innerHTML = '<p style="color: var(--accent);">Failed to fetch results.</p>';
            }
        }

        // Save Modal Logic
        function openModal(item) {
            selectedItem = item;
            document.getElementById('preview-poster').src = item.poster_url;
            document.getElementById('preview-title').innerText = item.title;
            document.getElementById('preview-meta').innerText = `${item.year} • ${item.genre} • ⭐ ${item.rating}`;
            document.getElementById('magnet-url').value = '';
            document.getElementById('save-modal').style.display = 'flex';
            document.getElementById('save-status').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('save-modal').style.display = 'none';
        }

        async function saveToCatalog() {
            const magnet = document.getElementById('magnet-url').value;
            const tier = document.getElementById('content-tier').value;
            if (!magnet) return alert('Magnet URL is required');

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = 'Saving...';

            try {
                const res = await fetch('/api/admin/catalog', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...selectedItem,
                        magnet_url: magnet,
                        tier: tier
                    })
                });

                if (res.ok) {
                    document.getElementById('save-status').style.display = 'block';
                    loadCatalog();
                    setTimeout(closeModal, 1500);
                }
            } catch (err) {
                alert('Error saving content');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = 'Save to Catalog';
            }
        }

        // Catalog List Logic
        async function loadCatalog() {
            try {
                const res = await fetch('/api/admin/catalog');
                const data = await res.json();
                const list = document.getElementById('catalog-list');
                list.innerHTML = '';

                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><img src="${item.poster_url}" style="width: 40px; border-radius: 4px;"></td>
                        <td style="font-weight: 600;">${item.title}</td>
                        <td>${item.year}</td>
                        <td><span style="font-size: 0.75rem; background: var(--bg); padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border);">${item.type}</span></td>
                        <td><span style="color: ${getTierColor(item.tier)}">${item.tier}</span></td>
                        <td><button class="btn-delete" onclick="deleteItem('${item.id}')">Delete</button></td>
                    `;
                    list.appendChild(row);
                });
            } catch (err) {
                console.error('Failed to load catalog');
            }
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            try {
                const res = await fetch(`/api/admin/catalog/${id}`, { method: 'DELETE' });
                if (res.ok) loadCatalog();
            } catch (err) {
                alert('Error deleting item');
            }
        }

        function getTierColor(tier) {
            switch(tier) {
                case 'Free': return '#cbd5e1';
                case 'Basic': return '#34d399';
                case 'Standard': return '#60a5fa';
                case 'Premium': return '#f472b6';
                default: return 'white';
            }
        }

        // Auto-check session
        if (sessionStorage.getItem('admin_auth') === 'true') {
            showDashboard();
        }
    </script>
</body>
</html>
